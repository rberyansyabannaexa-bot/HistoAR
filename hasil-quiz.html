<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quiz & HistoAI — Histoar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/main.css" />
<link rel="stylesheet" href="assets/css/components.css" />
</head>
<body>
<a class="skip-link" href="#main">Lompat ke konten</a>

<header class="site-header">
  <div class="container site-header__inner">
    <a href="index.html" class="site-header__brand"><span class="mark">◆</span> Histoar</a>
    <div class="core-sample" id="coreSample" aria-label="Progres belajar"></div>
  </div>
</header>

<main id="main" class="container">

  <!-- SECTION 1: QUIZ -->
  <section id="quizSection" class="quiz-panel">
    <div class="quiz-progress mono" id="quizProgress">Soal 1 / 3</div>
    <div class="quiz-question">
      <h3 id="quizQuestion">Memuat soal…</h3>
      <div class="quiz-options" id="quizOptions"></div>
    </div>
    <div class="quiz-nav">
      <button type="button" class="btn btn-primary" id="quizNextBtn" disabled>Lanjut</button>
    </div>
  </section>

  <!-- SECTION 2: HASIL + HistoAI (hidden sampai quiz selesai) -->
  <section id="resultSection" class="result-panel" hidden>
    <span class="eyebrow">Hasil Quiz</span>
    <p class="result-label">Skor Kamu</p>
    <div class="result-score" id="resultScore">0/0</div>

    <section id="chatSection" class="chat-panel" hidden>
      <div class="chat-panel__header">
        <span class="dot"></span>
        <strong>HistoAI</strong>
        <span class="mono" style="font-size: 0.75rem; color: var(--bone-dim);">— diskusi hasil quiz</span>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Tanya HistoAI soal materi ini..." />
        <button type="button" class="btn btn-primary" id="chatSendBtn">Kirim</button>
      </div>
    </section>

    <div style="margin-top: var(--space-4);">
      <a href="#" id="btnLanjutMateri" class="btn btn-primary" disabled>Lanjut ke Materi Berikutnya →</a>
      <p class="gate-note" id="gateNote">Chat dulu dengan HistoAI minimal satu kali untuk membuka materi berikutnya.</p>
    </div>
  </section>

</main>

<footer class="site-footer">
  <div class="container">
    <p class="mono">HISTOAR — Media Belajar Prasejarah Nusantara</p>
  </div>
</footer>

<script src="assets/js/progress.js"></script>
<script src="assets/js/router.js"></script>
<script src="assets/js/quiz-engine.js"></script>
<script src="assets/js/chatbot.js"></script>
<script src="assets/js/quiz-controller.js"></script>
</body>
</html>
