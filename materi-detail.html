<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scan AR — Histoar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/main.css" />
<link rel="stylesheet" href="assets/css/components.css" />

<!-- MindAR + A-Frame: image tracking AR, gratis & open-source, tanpa API key -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body class="ar-mode">

<div id="arRoot">
  <header class="ar-topbar">
    <a href="materi.html" class="ar-back">← Kembali</a>
    <h1 id="arHeading" class="ar-topbar__title">Memuat…</h1>
  </header>

  <div id="arSceneRoot" class="ar-scene-root">
    <!-- <a-scene> MindAR di-generate di sini oleh ar-controller.js -->
  </div>

  <div class="ar-scan-hint" id="arScanHint">
    <span class="mono">Arahkan kamera ke gambar target di buku/kartu</span>
  </div>

  <button type="button" id="arReopenBtn" class="ar-reopen-btn" hidden aria-label="Buka info lagi">ℹ️</button>

  <div id="arViewControls" class="ar-view-controls" hidden>
    <button type="button" id="btnZoomIn" aria-label="Perbesar model">➕</button>
    <button type="button" id="btnZoomOut" aria-label="Perkecil model">➖</button>
    <button type="button" id="btnResetView" aria-label="Reset tampilan">⟲</button>
    <button type="button" id="btnCopyView" aria-label="Salin posisi kamera saat ini" title="Salin posisi buat ditempel ke ar.json">📐</button>
  </div>

  <div id="arMoveControls" class="ar-move-controls" hidden>

  <button
    type="button"
    id="btnMoveUp"
    aria-label="Geser posisi model ke atas">
    ⬆
  </button>

  <button
    type="button"
    id="btnMoveDown"
    aria-label="Geser posisi model ke bawah">
    ⬇
  </button>

  <button
    type="button"
    id="btnMoveLeft"
    aria-label="Geser posisi model ke kiri">
    ⬅
  </button>

  <button
    type="button"
    id="btnMoveRight"
    aria-label="Geser posisi model ke kanan">
    ➡
  </button>

</div>

  <div id="arCopyToast" class="ar-copy-toast" hidden></div>

  <!-- Panel hotspot muncul setelah target AR terdeteksi -->
  <div id="arPanel" class="ar-panel" hidden>
    <div class="ar-panel__head">
      <h2 id="arPanelTitle">—</h2>
      <button type="button" id="arPanelClose" class="ar-panel__close" aria-label="Tutup panel">✕</button>
    </div>
    <div id="arHotspotRow" class="ar-hotspot-row"></div>
    <p id="arPanelDesc" class="ar-panel__desc">—</p>
    <button type="button" id="arDescToggle" class="ar-desc-toggle" hidden>Baca selengkapnya ▾</button>
    <div id="arProgressDots" class="ar-progress-dots"></div>
    <button type="button" id="btnKeQuiz" class="btn btn-primary ar-gate-btn" disabled>🔒 Memuat…</button>
    <p id="arGateNote" class="gate-note"></p>
  </div>
</div>

<script src="assets/js/progress.js"></script>
<script src="assets/js/router.js"></script>
<script src="assets/js/ar-controller.js"></script>
</body>
</html>
